services:
  # --- Infrastructure ---
  db_user:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_user_data:/var/lib/postgresql/data

  db_artwork:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: artwork_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_artwork_data:/var/lib/postgresql/data

  db_interaction:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: interaction_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_interaction_data:/var/lib/postgresql/data
        
  db_notification:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  consul:
    image: consul:1.15
    command: "agent -dev -client=0.0.0.0"
    ports:
      - "8500:8500"

  gateway:
    image: nginx:alpine
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - artwork_media:/usr/share/nginx/html/media:ro
    ports:
      - "8001:80"
    depends_on:
      - user-service
      - artwork-service
      - interaction-service
      - notification-service
      - frontend

  # --- Microservices ---
  user-service:
    build: ./services/user_service
    environment:
      - DATABASE_URL=postgres://user:password@db_user:5432/user_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - DEBUG=True
      - GOOGLE_CLIENT_ID=985300164541-aneiq6of2u1tdfefll3hiaa59sasdkn5.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=GOCSPX-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - SERVICE_NAME=user-service
      - SERVICE_PORT=8000
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - ENVIRONMENT=development
    volumes:
      - ./services/user_service:/app
    depends_on:
      - db_user
      - rabbitmq
      - consul
    ports:
      - "8000:8000"
    labels:
      - "artgram.service=user-service"
      - "artgram.version=1.0.0"
      - "artgram.environment=development"
      - "consul.service.enable=true"

  artwork-service:
    build: ./services/artwork_service
    environment:
      - DATABASE_URL=postgres://user:password@db_artwork:5432/artwork_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - DEBUG=True
      - SERVICE_NAME=artwork-service
      - SERVICE_PORT=8002
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - ENVIRONMENT=development
    volumes:
      - ./services/artwork_service:/app
      - artwork_media:/app/media
    depends_on:
      - db_artwork
      - rabbitmq
      - consul
    ports:
      - "8002:8000"
    labels:
      - "artgram.service=artwork-service"
      - "artgram.version=1.0.0"
      - "artgram.environment=development"
      - "consul.service.enable=true"

  interaction-service:
    build: ./services/interaction_service
    environment:
      - DATABASE_URL=postgres://user:password@db_interaction:5432/interaction_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - DEBUG=True
    volumes:
      - ./services/interaction_service:/app
    depends_on:
      - db_interaction
      - rabbitmq
      - consul

  notification-service:
    build: ./services/notification_service
    environment:
      - DATABASE_URL=postgres://user:password@db_notification:5432/notification_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - DEBUG=True
    volumes:
      - ./services/notification_service:/app
    depends_on:
      - db_notification
      - rabbitmq
      - consul

  notification-consumer:
    build: ./services/notification_service
    command: python consumer.py
    environment:
      - DATABASE_URL=postgres://user:password@db_notification:5432/notification_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - DEBUG=True
    volumes:
      - ./services/notification_service:/app
    depends_on:
      - db_notification
      - rabbitmq
      - consul

  frontend:                    
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8003:8000"
    volumes:
      - ./templates:/app/templates
      - artwork_media:/app/media
    depends_on:
      - user-service
      - artwork-service
      - interaction-service
      - notification-service

volumes:
  postgres_user_data:
  postgres_artwork_data:
  postgres_interaction_data:
  postgres_notification_data:
  artwork_media:
