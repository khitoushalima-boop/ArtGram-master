server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Media files handling
    location /media/ {
        alias /usr/share/nginx/html/media/;
        add_header 'Access-Control-Allow-Origin' '*';
        autoindex on;
    }
    
    # JavaScript files
    location ~* \.js$ {
        add_header 'Access-Control-Allow-Origin' '*';
    }
    
    # CSS files
    location ~* \.css$ {
        add_header 'Access-Control-Allow-Origin' '*';
    }
}
