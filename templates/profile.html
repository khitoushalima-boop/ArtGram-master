<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ArtGram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #f3f4f6;
            --accent: #ff6b6b;
            --text: #333;
            --light: #f8f9fa;
            --border: #e9ecef;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --sand: #f4e4c8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--light) 0%, var(--secondary) 100%);
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-header {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .profile-email {
            color: var(--text);
            font-size: 1.1em;
            opacity: 0.8;
        }

        .profile-bio {
            margin-top: 15px;
            line-height: 1.6;
            color: var(--text);
        }

        .profile-job-title {
            color: var(--primary);
            font-weight: 600;
            font-size: 1.2em;
            margin-top: 5px;
        }

        .profile-location {
            color: var(--text);
            font-size: 0.9em;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .profile-website {
            margin-top: 8px;
        }

        .profile-website a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .profile-website a:hover {
            text-decoration: underline;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--primary);
            display: block;
            margin-bottom: 10px;
        }

        .stat-label {
            color: var(--text);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .achievements-section {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .achievement-card {
            background: linear-gradient(135deg, var(--light) 0%, var(--white) 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .achievement-card.unlocked {
            border-color: var(--success);
            background: linear-gradient(135deg, #d4edda 0%, var(--white) 100%);
        }

        .achievement-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .achievement-icon {
            font-size: 3em;
            margin-bottom: 15px;
            display: block;
        }

        .achievement-name {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .achievement-description {
            color: var(--text);
            font-size: 0.9em;
            line-height: 1.4;
        }

        .achievement-points {
            background: var(--primary);
            color: var(--white);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 15px;
            display: inline-block;
        }

        .achievement-category {
            background: var(--secondary);
            color: var(--text);
            font-size: 0.8em;
            padding: 3px 8px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: inline-block;
            text-transform: uppercase;
            font-weight: 600;
        }

        .achievement-progress {
            margin: 10px 0;
        }

        .progress-bar {
            background: var(--border);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.8em;
            color: var(--text);
            text-align: center;
        }

        .achievement-rare-badge {
            background: linear-gradient(135deg, var(--warning), var(--accent));
            color: var(--white);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: bold;
            position: absolute;
            top: 10px;
            right: 10px;
            text-transform: uppercase;
        }

        .achievement-card.rare {
            border: 2px solid var(--warning);
            background: linear-gradient(135deg, #fff9e6 0%, var(--white) 100%);
        }

        .achievement-card.milestone {
            border-left: 4px solid var(--primary);
        }

        .achievement-card.community {
            border-left: 4px solid var(--success);
        }

        .achievement-card.creative {
            border-left: 4px solid var(--accent);
        }

        .achievement-card.engagement {
            border-left: 4px solid var(--warning);
        }

        .achievement-card.professional {
            border-left: 4px solid var(--danger);
        }

        .arts-section {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
        }

        .arts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .art-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
        }

        .art-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }

        .art-image-container {
            position: relative;
            width: 100%;
            height: 240px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--light) 100%);
        }

        .art-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .art-card:hover .art-image {
            transform: scale(1.08);
        }

        .art-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.7) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }

        .art-card:hover .art-overlay {
            opacity: 1;
        }

        .art-overlay-text {
            color: var(--white);
            font-weight: bold;
            font-size: 1.1em;
        }

        .art-info {
            padding: 20px;
        }

        .art-title {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .art-description {
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .art-stats {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px;
        }

        .back-btn {
            background: var(--primary);
            color: var(--white);
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s ease;
        }

        .back-btn:hover {
            background: var(--accent);
        }

        .error-content h3 {
            margin-bottom: 15px;
            color: var(--danger);
        }

        .error-content p {
            margin-bottom: 20px;
            color: var(--text);
        }

        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .retry-btn, .generate-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .retry-btn {
            background: var(--primary);
            color: var(--white);
        }

        .retry-btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .generate-btn {
            background: var(--success);
            color: var(--white);
        }

        .generate-btn:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }

        .metrics-section {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            margin-top: 30px;
        }

        .metrics-section h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .metric-card {
            background: linear-gradient(135deg, var(--light) 0%, var(--white) 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .metric-label {
            color: var(--text);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-stats {
                grid-template-columns: 1fr;
            }

            .achievements-grid,
            .arts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Loading profile...
        </div>

        <div id="error" class="error" style="display: none;">
            <div class="error-content">
                <i class="fas fa-exclamation-triangle"></i>
                <h3>Unable to Load Profile</h3>
                <p id="error-message">There was an error loading your profile data.</p>
                <div class="error-actions">
                    <button onclick="loadProfile()" class="retry-btn">
                        <i class="fas fa-redo"></i>
                        Try Again
                    </button>
                    <button onclick="generateFallbackProfile()" class="generate-btn">
                        <i class="fas fa-user-plus"></i>
                        Generate Profile
                    </button>
                </div>
            </div>
        </div>

        <div id="profile-content" style="display: none;">
            <!-- Profile Header -->
            <div class="profile-header">
                <img id="user-avatar" class="profile-avatar" src="" alt="Profile Avatar">
                <div class="profile-info">
                    <div id="user-name" class="profile-name"></div>
                    <div id="user-job-title" class="profile-job-title" style="display: none;"></div>
                    <div id="user-location" class="profile-location" style="display: none;"></div>
                    <div id="user-website" class="profile-website" style="display: none;"></div>
                    <div id="user-email" class="profile-email"></div>
                    <div id="user-bio" class="profile-bio"></div>
                </div>
            </div>

            <!-- Profile Stats -->
            <div class="profile-stats">
                <div class="stat-card">
                    <div id="total-points" class="stat-number">0</div>
                    <div class="stat-label">Total Points</div>
                </div>
                <div class="stat-card">
                    <div id="achievement-count" class="stat-number">0</div>
                    <div class="stat-label">Achievements</div>
                </div>
                <div class="stat-card">
                    <div id="art-count" class="stat-number">0</div>
                    <div class="stat-label">Arts Created</div>
                </div>
                <div class="stat-card">
                    <div id="followers-count" class="stat-number">0</div>
                    <div class="stat-label">Followers</div>
                </div>
            </div>

            <!-- Achievements Section -->
            <div class="achievements-section">
                <h2 class="section-title">
                    <i class="fas fa-trophy"></i>
                    Achievements
                </h2>
                <div id="achievements-grid" class="achievements-grid">
                    <!-- Achievements will be loaded here -->
                </div>
            </div>

            <!-- Arts Section -->
            <div class="arts-section">
                <h2 class="section-title">
                    <i class="fas fa-palette"></i>
                    My Arts
                </h2>
                <div id="arts-grid" class="arts-grid">
                    <!-- Arts will be loaded here -->
                </div>
            </div>

            <!-- Back Button -->
            <div style="text-align: center; margin-top: 30px;">
                <a href="index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        const token = localStorage.getItem('access_token');
        const username = localStorage.getItem('username');
        
        if (!token || !username) {
            console.log('No authentication found, redirecting to login');
            window.location.href = '/log.html';
            return;
        }
        
        console.log('User authenticated:', username);
        console.log('Token available:', token ? 'Yes' : 'No');

        // Fetch user profile data
        async function loadProfile() {
            console.log('Starting profile load...');
            
            try {
                // Use the enhanced aggregated profile endpoint
                const response = await fetch('http://localhost:8000/api/users/profiles/aggregated/', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log('Enhanced profile data loaded successfully:', data);
                    displayEnhancedProfile(data);
                } else {
                    const errorText = await response.text();
                    console.error('Profile API error:', response.status, errorText);
                    
                    // Try fallback to basic profile endpoint
                    console.log('Trying fallback to basic profile endpoint...');
                    await loadBasicProfile();
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                showError('Connection error. Please try again.');
                
                // Generate fallback profile
                generateFallbackProfile();
            }
        }

        // Fallback to basic profile endpoint
        async function loadBasicProfile() {
            try {
                const response = await fetch('http://localhost:8000/api/users/profiles/me/', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log('Basic profile data loaded:', data);
                    displayEnhancedProfile(data); // Use same display function
                } else {
                    console.error('Basic profile API error:', response.status);
                    generateFallbackProfile();
                }
            } catch (error) {
                console.error('Error loading basic profile:', error);
                generateFallbackProfile();
            }
        }

        // Generate fallback profile with sample data
        function generateFallbackProfile() {
            console.log('Generating fallback profile...');
            
            const fallbackData = {
                id: 1,
                username: username || 'User',
                email: 'user@example.com',
                avatar: null,
                bio: 'Welcome to your ArtGram profile! Your profile is being set up.',
                job_title: 'Digital Artist',
                location: 'Your Location',
                website: 'https://yourwebsite.com',
                total_points: 0,
                achievements: [],
                followers_count: 0,
                following_count: 0,
                arts_count: 0,
                arts_data: {
                    total_arts: 0,
                    recent_arts: [],
                    total_views: 0,
                    total_likes: 0
                },
                interaction_data: {
                    total_followers: 0,
                    total_following: 0,
                    engagement_rate: 0
                },
                derived_metrics: {
                    engagement_score: 0,
                    activity_level: 'low',
                    influence_score: 0,
                    profile_completion: 25
                }
            };
            
            displayEnhancedProfile(fallbackData);
            console.log('Fallback profile generated successfully');
        }

        // Display enhanced profile data with all new features
        function displayEnhancedProfile(data) {
            // Hide loading and error
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('profile-content').style.display = 'block';

            // Update profile info
            document.getElementById('user-name').textContent = data.username || 'Unknown';
            document.getElementById('user-email').textContent = data.email || '';
            document.getElementById('user-bio').textContent = data.bio || 'No bio available';
            
            // Update professional identity fields
            const jobTitleEl = document.getElementById('user-job-title');
            const locationEl = document.getElementById('user-location');
            const websiteEl = document.getElementById('user-website');
            
            if (data.job_title) {
                jobTitleEl.textContent = data.job_title;
                jobTitleEl.style.display = 'block';
            }
            
            if (data.location) {
                locationEl.innerHTML = `<i class="fas fa-map-marker-alt"></i> ${data.location}`;
                locationEl.style.display = 'flex';
            }
            
            if (data.website) {
                websiteEl.innerHTML = `<a href="${data.website}" target="_blank" rel="noopener noreferrer"><i class="fas fa-globe"></i> ${data.website}</a>`;
                websiteEl.style.display = 'block';
            }

            // Update avatar
            const avatarElement = document.getElementById('user-avatar');
            if (data.avatar && data.avatar !== null && data.avatar !== '') {
                // If avatar exists, make sure it's a full URL
                if (data.avatar.startsWith('http')) {
                    avatarElement.src = data.avatar;
                } else {
                    avatarElement.src = 'http://localhost:8000' + data.avatar;
                }
                avatarElement.onerror = function() {
                    // Fallback if image fails to load
                    this.src = 'https://picsum.photos/seed/' + encodeURIComponent(data.username || 'user') + '/120/120.jpg';
                };
            } else {
                // Default avatar with user's first letter
                const firstLetter = (data.username || 'User').charAt(0).toUpperCase();
                avatarElement.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(firstLetter) + '&size=120&background=6366f1&color=ffffff&bold=true';
            }

            // Update enhanced stats with aggregated data
            document.getElementById('total-points').textContent = data.total_points || 0;
            document.getElementById('achievement-count').textContent = data.achievements ? data.achievements.length : 0;
            document.getElementById('art-count').textContent = data.arts_data ? data.arts_data.total_arts : 0;
            document.getElementById('followers-count').textContent = data.interaction_data ? data.interaction_data.total_followers : 0;

            // Display enhanced achievements with categories and progress
            displayAchievements(data.achievements || []);

            // Display arts from aggregated data
            displayArts(data.arts_data ? data.arts_data.recent_arts : []);

            // Display derived metrics
            displayDerivedMetrics(data.derived_metrics || {});
        }

        // Display derived metrics
        function displayDerivedMetrics(metrics) {
            // Create metrics display section
            const metricsContainer = document.getElementById('derived-metrics') || createMetricsContainer();
            
            metricsContainer.innerHTML = `
                <h3>Performance Metrics</h3>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value">${metrics.engagement_score || 0}</div>
                        <div class="metric-label">Engagement Score</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${metrics.activity_level || 'Low'}</div>
                        <div class="metric-label">Activity Level</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${metrics.influence_score || 0}</div>
                        <div class="metric-label">Influence Score</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${metrics.profile_completion || 0}%</div>
                        <div class="metric-label">Profile Completion</div>
                    </div>
                </div>
            `;
        }

        // Create metrics container if it doesn't exist
        function createMetricsContainer() {
            const container = document.createElement('div');
            container.id = 'derived-metrics';
            container.className = 'metrics-section';
            
            // Insert after arts section
            const artsSection = document.querySelector('.arts-section');
            artsSection.parentNode.insertBefore(container, artsSection.nextSibling);
            
            return container;
        }

        // Display achievements
        function displayAchievements(achievements) {
            const grid = document.getElementById('achievements-grid');
            grid.innerHTML = '';

            achievements.forEach(userAchievement => {
                const achievement = userAchievement.achievement;
                const progress = userAchievement.progress_percentage || 100;
                const isRare = achievement.is_rare;
                const category = achievement.category;
                
                const card = document.createElement('div');
                card.className = `achievement-card unlocked ${isRare ? 'rare' : ''} ${category}`;
                card.innerHTML = `
                    <div class="achievement-icon">${achievement.icon || '??'}</div>
                    <div class="achievement-name">${achievement.name}</div>
                    <div class="achievement-category">${category.charAt(0).toUpperCase() + category.slice(1)}</div>
                    <div class="achievement-description">${achievement.description}</div>
                    ${progress < 100 ? `
                    <div class="achievement-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                        <div class="progress-text">${Math.round(progress)}%</div>
                    </div>
                    ` : ''}
                    <div class="achievement-points">${achievement.points} points</div>
                    ${isRare ? '<div class="achievement-rare-badge">Rare</div>' : ''}
                `;
                grid.appendChild(card);
            });
        }

        // Display arts with enhanced layout and artwork service integration
        async function displayArts(arts) {
            const grid = document.getElementById('arts-grid');
            grid.innerHTML = '';

            // If no arts provided, try to fetch from artwork service
            if (!arts || arts.length === 0) {
                try {
                    const response = await fetch('http://localhost:8002/api/artworks/user-arts/', {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        arts = await response.json();
                    } else {
                        // Fallback to sample data
                        arts = [
                            {
                                title: 'Sunset Dreams',
                                description: 'A beautiful sunset over mountains',
                                image: 'https://picsum.photos/seed/sunset/400/300',
                                likes: 42,
                                views: 156
                            },
                            {
                                title: 'Ocean Waves',
                                description: 'Peaceful ocean waves at dawn',
                                image: 'https://picsum.photos/seed/ocean/400/300',
                                likes: 28,
                                views: 89
                            },
                            {
                                title: 'Forest Path',
                                description: 'A mysterious path through the forest',
                                image: 'https://picsum.photos/seed/forest/400/300',
                                likes: 67,
                                views: 234
                            }
                        ];
                    }
                } catch (error) {
                    console.log('Artwork service not available, using sample data');
                    arts = [
                        {
                            title: 'Digital Landscape',
                            description: 'Modern digital art piece',
                            image: 'https://picsum.photos/seed/digital/400/300',
                            likes: 15,
                            views: 45
                        }
                    ];
                }
            }

            arts.forEach((art, index) => {
                const card = document.createElement('div');
                card.className = 'art-card';
                card.innerHTML = `
                    <div class="art-image-container">
                        <img class="art-image" src="${art.image || 'https://picsum.photos/seed/art' + index + '/400/300'}" alt="${art.title}" loading="lazy">
                        <div class="art-overlay">
                            <div class="art-overlay-text">View Artwork</div>
                        </div>
                    </div>
                    <div class="art-info">
                        <div class="art-title">${art.title}</div>
                        <div class="art-description">${art.description || 'No description available'}</div>
                        <div class="art-stats">
                            <span><i class="fas fa-heart"></i> ${art.likes || 0}</span>
                            <span><i class="fas fa-eye"></i> ${art.views || 0}</span>
                            <span><i class="fas fa-comment"></i> ${art.comments || 0}</span>
                        </div>
                    </div>
                `;
                
                // Add click handler for artwork detail view
                card.addEventListener('click', () => {
                    showArtworkDetail(art);
                });
                
                grid.appendChild(card);
            });
        }

        // Show artwork detail modal
        function showArtworkDetail(art) {
            // Create modal overlay
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                cursor: pointer;
            `;
            
            modal.innerHTML = `
                <div style="max-width: 90%; max-height: 90%; background: white; border-radius: 16px; overflow: hidden; position: relative;">
                    <button style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; z-index: 1001;">×</button>
                    <img src="${art.image}" style="width: 100%; max-height: 70vh; object-fit: contain;">
                    <div style="padding: 20px;">
                        <h2 style="margin: 0 0 10px 0; color: var(--primary);">${art.title}</h2>
                        <p style="margin: 0 0 15px 0; color: var(--text);">${art.description || 'No description available'}</p>
                        <div style="display: flex; gap: 20px; color: var(--text);">
                            <span><i class="fas fa-heart"></i> ${art.likes || 0}</span>
                            <span><i class="fas fa-eye"></i> ${art.views || 0}</span>
                            <span><i class="fas fa-comment"></i> ${art.comments || 0}</span>
                        </div>
                    </div>
                </div>
            `;
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal || e.target.textContent === '×') {
                    document.body.removeChild(modal);
                }
            });
            
            document.body.appendChild(modal);
        }

        // Show error
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('profile-content').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }

        // Load profile when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Profile page loaded, initializing...');
            
            // Check if user is logged in
            const token = localStorage.getItem('access_token');
            const username = localStorage.getItem('username');
            
            if (!token || !username) {
                console.log('No authentication found, redirecting to login');
                window.location.href = '/log.html';
                return;
            }
            
            console.log('User authenticated, loading profile...');
            loadProfile();
        });

        // Also try to load immediately for faster response
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadProfile);
        } else {
            loadProfile();
        }
    </script>
</body>
</html>
