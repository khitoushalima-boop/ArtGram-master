<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ArtGram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root{
            --cream:    #f5f0e8;
            --parchment:#ede6d6;
            --sand:     #d6c9b0;
            --gold:     #b59a6a;
            --brown:    #5a3e28;
            --espresso: #2b1d12;
            --ink:      #1a1410;
            --mist:     #8a7d6e;
            --white:    #fdfaf5;
            --serif:    'Playfair Display', Georgia, serif;
            --narrow:   'Cormorant Garamond', serif;
            --sans:     'Jost', sans-serif;
            --ease:     cubic-bezier(.25,.46,.45,.94);
        }

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{
            background:var(--cream);
            color:var(--ink);
            font-family:var(--sans);
            font-weight:300;
            min-height:100vh;
        }
        a{text-decoration:none;color:inherit}

        nav{
            position:fixed;
            top:0;
            left:0;
            right:0;
            z-index:100;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 3rem;
            height:68px;
            background:rgba(245,240,232,.92);
            backdrop-filter:blur(12px);
            border-bottom:1px solid var(--sand);
        }
        .nav-logo{
            font-family:var(--serif);
            font-size:1.45rem;
            font-weight:700;
            letter-spacing:.04em;
            color:var(--espresso);
        }
        .nav-logo span{font-style:italic;color:var(--gold)}

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 3rem 3rem;
        }

        .profile-header {
            display: flex;
            gap: 3rem;
            align-items: flex-start;
            padding-bottom: 3rem;
            border-bottom: 1px solid var(--sand);
            margin-bottom: 3rem;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--sand);
            flex-shrink: 0;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .profile-info { flex: 1; }
        .profile-name {
            font-family: var(--serif);
            font-size: 2.2rem;
            color: var(--espresso);
            margin-bottom: 0.5rem;
        }
        .profile-handle {
            font-size: 0.9rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .profile-bio {
            font-family: var(--narrow);
            font-style: italic;
            font-size: 1.1rem;
            color: var(--mist);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .profile-stats { display: flex; gap: 2.5rem; }
        .profile-stat { text-align: center; }
        .profile-stat strong {
            display: block;
            font-family: var(--serif);
            font-size: 1.4rem;
            color: var(--espresso);
        }
        .profile-stat span {
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--mist);
        }

        .section-title {
            font-family: var(--serif);
            font-size: 1.2rem;
            color: var(--espresso);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--sand), transparent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .card {
            background: var(--white);
            border: 1px solid var(--sand);
            overflow: hidden;
            transition: transform 0.3s var(--ease);
            display: block; /* Ensure link card works properly */
        }
        .card:hover { transform: translateY(-5px); }
        .card-img { aspect-ratio: 4/3; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 1rem; }
        .card-title { font-family: var(--serif); font-size: 1rem; color: var(--espresso); }

        .btn-follow {
            padding: 0.6rem 1.5rem;
            background: var(--espresso);
            color: var(--cream);
            border: none;
            font-family: var(--sans);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        .btn-follow:hover { background: var(--brown); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">Art<span>Gram</span></a>
    </nav>

    <div class="container" id="profile-container">
        <p>Loading profile...</p>
    </div>

    <script>
        const USER_API = 'http://127.0.0.1:8000/api/users/';
        const ARTWORKS_API = 'http://127.0.0.1:8002/api/artworks/';

        async function fetchProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('username');
            const container = document.getElementById('profile-container');

            if (!username) {
                container.innerHTML = '<p>User not specified.</p>';
                return;
            }

            try {
                // Fetch User Data
                const userRes = await fetch(`${USER_API}profile/${username}/`);
                const user = await userRes.json();

                // Fetch User Artworks
                const artworksRes = await fetch(`${ARTWORKS_API}user/${username}/`);
                const artworks = await artworksRes.json();

                container.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <img src="${user.avatar || 'https://ui-avatars.com/api/?name=' + user.username + '&size=200&background=b59a6a&color=ffffff'}" alt="${user.username}">
                        </div>
                        <div class="profile-info">
                            <h1 class="profile-name">${user.username}</h1>
                            <div class="profile-handle">@${user.username} ${user.location ? '· ' + user.location : ''}</div>
                            <div class="profile-bio">${user.bio || 'No bio yet.'}</div>
                            
                            <div class="profile-stats">
                                <div class="profile-stat"><strong>${artworks.length}</strong><span>Works</span></div>
                                <div class="profile-stat"><strong>${user.followers_count || 0}</strong><span>Followers</span></div>
                                <div class="profile-stat"><strong>${user.following_count || 0}</strong><span>Following</span></div>
                            </div>
                        </div>
                    </div>

                    <h2 class="section-title">Portfolio</h2>
                    <div class="grid">
                        ${artworks.map(artwork => `
                            <a href="artwork_detail.html?id=${artwork.id}" class="card">
                                <div class="card-img">
                                    <img src="${artwork.image}" alt="${artwork.title}">
                                </div>
                                <div class="card-body">
                                    <h3 class="card-title">${artwork.title}</h3>
                                </div>
                            </a>
                        `).join('')}
                        ${artworks.length === 0 ? '<p style="color: var(--mist); font-style: italic;">No works yet.</p>' : ''}
                    </div>
                `;
            } catch (error) {
                console.error('Error fetching profile:', error);
                container.innerHTML = '<p>Error loading profile.</p>';
            }
        }

        fetchProfile();
    </script>
</body>
</html>
