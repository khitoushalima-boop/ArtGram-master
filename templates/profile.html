<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ArtGram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root{
            --cream:    #f5f0e8;
            --parchment:#ede6d6;
            --sand:     #d6c9b0;
            --gold:     #b59a6a;
            --brown:    #5a3e28;
            --espresso: #2b1d12;
            --ink:      #1a1410;
            --mist:     #8a7d6e;
            --white:    #fdfaf5;
            --serif:    'Playfair Display', Georgia, serif;
            --narrow:   'Cormorant Garamond', serif;
            --sans:     'Jost', sans-serif;
            --ease:     cubic-bezier(.25,.46,.45,.94);
        }

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{
            background:var(--cream);
            color:var(--ink);
            font-family:var(--sans);
            font-weight:300;
            min-height:100vh;
        }
        a{text-decoration:none;color:inherit}

        nav{
            position:fixed;
            top:0;
            left:0;
            right:0;
            z-index:100;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 3rem;
            height:68px;
            background:rgba(245,240,232,.92);
            backdrop-filter:blur(12px);
            border-bottom:1px solid var(--sand);
        }
        .nav-logo{
            font-family:var(--serif);
            font-size:1.45rem;
            font-weight:700;
            letter-spacing:.04em;
            color:var(--espresso);
        }
        .nav-logo span{font-style:italic;color:var(--gold)}

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 3rem 3rem;
        }

        .profile-header {
            display: flex;
            gap: 3rem;
            align-items: flex-start;
            padding-bottom: 3rem;
            border-bottom: 1px solid var(--sand);
            margin-bottom: 3rem;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--sand);
            flex-shrink: 0;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .profile-info { flex: 1; }
        .profile-name {
            font-family: var(--serif);
            font-size: 2.2rem;
            color: var(--espresso);
            margin-bottom: 0.5rem;
        }
        .profile-handle {
            font-size: 0.9rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .profile-bio {
            font-family: var(--narrow);
            font-style: italic;
            font-size: 1.1rem;
            color: var(--mist);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .profile-stats { display: flex; gap: 2.5rem; }
        .profile-stat { text-align: center; }
        .profile-stat strong {
            display: block;
            font-family: var(--serif);
            font-size: 1.4rem;
            color: var(--espresso);
        }
        .profile-stat span {
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--mist);
        }

        .section-title {
            font-family: var(--serif);
            font-size: 1.2rem;
            color: var(--espresso);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--sand), transparent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .card {
            background: var(--white);
            border: 1px solid var(--sand);
            overflow: hidden;
            transition: transform 0.3s var(--ease);
            display: block; /* Ensure link card works properly */
        }
        .card:hover { transform: translateY(-5px); }
        .card-img { aspect-ratio: 4/3; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 1rem; }
        .card-title { font-family: var(--serif); font-size: 1rem; color: var(--espresso); }

        .btn-follow {
            padding: 0.6rem 1.5rem;
            background: var(--espresso);
            color: var(--cream);
            border: none;
            font-family: var(--sans);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        .btn-follow:hover { background: var(--brown); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">Art<span>Gram</span></a>
    </nav>

    <div class="container" id="profile-container">
        <p>Loading profile...</p>
    </div>

    <script>
        const USER_API = 'http://localhost:8001/api/users/';
        const ARTWORKS_API = 'http://localhost:8001/api/artworks/';

        // Get JWT token from localStorage
        function getJWTToken() {
            const token = localStorage.getItem('access_token') || localStorage.getItem('jwtToken');
            console.log('🔑 JWT Token Debug:', {
                token: token ? 'Present' : 'Missing',
                value: token ? token.substring(0, 20) + '...' : 'None',
                storageKeys: Object.keys(localStorage)
            });
            return token;
        }

        // Extract user ID from JWT token
        function getUserIdFromToken(token) {
            if (!token) return null;
            
            try {
                // JWT tokens have 3 parts separated by dots
                const parts = token.split('.');
                if (parts.length !== 3) return null;
                
                // Decode the payload (second part) with proper base64 padding
                let payloadBase64 = parts[1];
                
                // Add padding if needed
                while (payloadBase64.length % 4 !== 0) {
                    payloadBase64 += '=';
                }
                
                const payload = JSON.parse(atob(payloadBase64));
                console.log('🔍 JWT Payload:', payload);
                
                return payload.user_id || payload.sub || null;
            } catch (error) {
                console.error('❌ Error decoding JWT token:', error);
                console.error('🔍 Token parts:', token.split('.'));
                return null;
            }
        }

        // Get current user ID from stored token
        function getCurrentUserId() {
            const token = getJWTToken();
            if (!token) {
                console.log('❌ No JWT token found');
                return null;
            }
            
            const userId = getUserIdFromToken(token);
            console.log('👤 Current User ID:', userId);
            return userId;
        }

        // Enhanced fetch function with JWT support
        async function authFetch(url, options = {}) {
            console.log('🌐 Auth Request:', { url, options });
            
            const jwtToken = getJWTToken();
            
            const defaultOptions = {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest',
                    'Accept': 'application/json'
                }
            };
            
            // Add JWT token for authenticated requests
            if (jwtToken) {
                defaultOptions.headers['Authorization'] = `Bearer ${jwtToken}`;
            }
            
            const fetchOptions = { ...defaultOptions, ...options };
            
            try {
                const response = await fetch(url, fetchOptions);
                
                console.log('📊 Response Status:', response.status);
                console.log('📊 Response Headers:', [...response.headers.entries()]);
                
                // Handle 401 Unauthorized - token might be expired
                if (response.status === 401) {
                    console.log('🔄 Token expired, clearing and redirecting to login');
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    localStorage.removeItem('user');
                    window.location.href = 'log.html';
                    return;
                }
                
                return response;
                
            } catch (error) {
                console.error('💥 Auth fetch error:', error);
                throw error;
            }
        }

        async function fetchProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('username');
            const container = document.getElementById('profile-container');

            // Update UI to show loading state
            container.innerHTML = '<p style="text-align: center; padding: 2rem;">Loading profile...</p>';

            try {
                let userRes;
                let user;

                // If username is specified in URL, load that user's profile
                if (username) {
                    console.log(`👤 Loading profile for username: ${username}`);
                    
                    // For username-based profiles, hit the username endpoint
                    userRes = await authFetch(`${USER_API}profile/username/${username}/`);
                    
                    console.log(`🌐 Requesting: ${USER_API}profile/username/${username}/`);
                } else {
                    // Load current user's profile using user_id from JWT token
                    const userId = getCurrentUserId();
                    if (!userId) {
                        container.innerHTML = `
                            <div style="text-align: center; padding: 2rem;">
                                <h2>Authentication Required</h2>
                                <p>No user ID found in token. Please login again.</p>
                                <a href="log.html" style="display: inline-block; padding: 0.75rem 1.5rem; background: var(--gold); color: white; text-decoration: none; border-radius: 4px; margin-top: 1rem;">
                                    Go to Login
                                </a>
                            </div>
                        `;
                        return;
                    }
                    
                    console.log(`👤 Loading current user profile with ID: ${userId}`);
                    userRes = await authFetch(`${USER_API}profile/${userId}/`);
                }
                
                if (!userRes.ok) {
                    const errorData = await userRes.json().catch(() => ({}));
                    const errorMessage = errorData.error || errorData.detail || `Failed to fetch user: ${userRes.status}`;
                    throw new Error(errorMessage);
                }
                
                user = await userRes.json();
                console.log('✅ User data loaded:', user);

                // Fetch User Artworks (with error handling)
                const artworkUsername = user.username;
                let artworks = [];
                
                try {
                    console.log(`🎨 Fetching artworks for user: ${artworkUsername}`);
                    const artworksRes = await fetch(`${ARTWORKS_API}user/${artworkUsername}/`);
                    
                    if (artworksRes.ok) {
                        artworks = await artworksRes.json();
                        console.log(`✅ Artworks loaded: ${artworks.length} items`);
                    } else {
                        console.warn(`⚠️ Artworks endpoint returned status: ${artworksRes.status}`);
                        // Artworks endpoint might not exist, continue without artworks
                        artworks = [];
                    }
                } catch (artworkError) {
                    console.warn(`⚠️ Could not fetch artworks: ${artworkError.message}`);
                    // Continue without artworks if the endpoint doesn't exist
                    artworks = [];
                }

                container.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <img src="${user.avatar || 'https://ui-avatars.com/api/?name=' + user.username + '&size=200&background=b59a6a&color=ffffff'}" alt="${user.username}">
                        </div>
                        <div class="profile-info">
                            <h1 class="profile-name">${user.username}</h1>
                            <div class="profile-handle">@${user.username} ${user.location ? '· ' + user.location : ''}</div>
                            <div class="profile-bio">${user.bio || 'No bio yet.'}</div>
                            
                            <div class="profile-stats">
                                <div class="profile-stat"><strong>${artworks.length}</strong><span>Works</span></div>
                                <div class="profile-stat"><strong>${user.followers_count || 0}</strong><span>Followers</span></div>
                                <div class="profile-stat"><strong>${user.following_count || 0}</strong><span>Following</span></div>
                            </div>
                        </div>
                    </div>

                    <h2 class="section-title">Portfolio</h2>
                    <div class="grid">
                        ${artworks.map(artwork => `
                            <a href="artwork_detail.html?id=${artwork.id}" class="card">
                                <div class="card-img">
                                    <img src="${artwork.image}" alt="${artwork.title}">
                                </div>
                                <div class="card-body">
                                    <h3 class="card-title">${artwork.title}</h3>
                                </div>
                            </a>
                        `).join('')}
                        ${artworks.length === 0 ? '<p style="color: var(--mist); font-style: italic;">No works yet.</p>' : ''}
                    </div>
                `;
            } catch (error) {
                console.error('💥 Error fetching profile:', error);
                console.error('📊 Error details:', {
                    message: error.message,
                    stack: error.stack,
                    username: username || 'none',
                    tokenPresent: !!getJWTToken()
                });
                
                // Provide more detailed error information
                let errorMessage = error.message || 'Unknown error occurred';
                
                // Check for specific error types
                if (errorMessage.includes('Failed to fetch') || errorMessage.includes('NetworkError')) {
                    errorMessage = 'Network error - unable to connect to the server. Please check your connection.';
                } else if (errorMessage.includes('401') || errorMessage.includes('Unauthorized')) {
                    errorMessage = 'Authentication failed - please login again.';
                } else if (errorMessage.includes('404') || errorMessage.includes('not found')) {
                    errorMessage = 'User not found in the system.';
                } else if (errorMessage.includes('User not specified')) {
                    errorMessage = 'User not specified - please provide a username in the URL.';
                } else if (errorMessage.includes('400') || errorMessage.includes('Bad Request')) {
                    errorMessage = 'Invalid request - please try again.';
                }
                
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem;">
                        <h2>Error loading profile</h2>
                        <p style="color: var(--brown); margin: 1rem 0;">${errorMessage}</p>
                        <details style="text-align: left; margin: 1rem 0; padding: 1rem; background: var(--parchment); border-radius: 4px;">
                            <summary style="cursor: pointer; font-weight: bold;">Technical Details</summary>
                            <pre style="font-size: 0.8rem; margin-top: 0.5rem; overflow-x: auto;">
Error: ${error.message}
Username: ${username || 'none'}
Token Present: ${!!getJWTToken()}
Time: ${new Date().toISOString()}
                            </pre>
                        </details>
                        <div style="margin-top: 1.5rem;">
                            <button onclick="location.reload()" style="padding: 0.5rem 1rem; background: var(--gold); color: white; border: none; border-radius: 4px; margin-right: 0.5rem;">
                                Retry
                            </button>
                            <a href="log.html" style="display: inline-block; padding: 0.5rem 1rem; color: var(--gold); text-decoration: none;">
                                Go to Login
                            </a>
                        </div>
                    </div>
                `;
            }
        }

        // Load current user's profile
        async function loadCurrentUserProfile(container) {
            try {
                console.log('👤 Loading current authenticated user profile...');
                
                // Fetch current user data with JWT token
                const userRes = await authFetch(`${USER_API}profile/`);
                
                if (!userRes.ok) {
                    if (userRes.status === 401) {
                        // Not authenticated, redirect to login
                        window.location.href = 'log.html';
                        return;
                    }
                    throw new Error(`Failed to fetch profile: ${userRes.status}`);
                }
                
                const user = await userRes.json();
                console.log('✅ Current user profile loaded:', user);

                // Fetch current user's artworks (with error handling)
                let artworks = [];
                
                try {
                    console.log(`🎨 Fetching artworks for current user: ${user.username}`);
                    const artworksRes = await fetch(`${ARTWORKS_API}user/${user.username}/`);
                    
                    if (artworksRes.ok) {
                        artworks = await artworksRes.json();
                        console.log(`✅ Artworks loaded: ${artworks.length} items`);
                    } else {
                        console.warn(`⚠️ Artworks endpoint returned status: ${artworksRes.status}`);
                        artworks = [];
                    }
                } catch (artworkError) {
                    console.warn(`⚠️ Could not fetch artworks: ${artworkError.message}`);
                    artworks = [];
                }

                // Add edit profile button for current user
                container.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <img src="${user.avatar || 'https://ui-avatars.com/api/?name=' + user.username + '&size=200&background=b59a6a&color=ffffff'}" alt="${user.username}">
                        </div>
                        <div class="profile-info">
                            <h1 class="profile-name">${user.username}</h1>
                            <div class="profile-handle">@${user.username} ${user.location ? '· ' + user.location : ''}</div>
                            <div class="profile-bio">${user.bio || 'No bio yet.'}</div>
                            
                            <div class="profile-stats">
                                <div class="profile-stat"><strong>${artworks.length}</strong><span>Works</span></div>
                                <div class="profile-stat"><strong>${user.followers_count || 0}</strong><span>Followers</span></div>
                                <div class="profile-stat"><strong>${user.following_count || 0}</strong><span>Following</span></div>
                            </div>
                            
                            <div class="profile-actions">
                                <a href="profile_edit.html" class="btn btn-primary">Edit Profile</a>
                                <button onclick="logout()" class="btn btn-secondary">Logout</button>
                            </div>
                        </div>
                    </div>

                    <h2 class="section-title">My Portfolio</h2>
                    <div class="grid">
                        ${artworks.map(artwork => `
                            <a href="artwork_detail.html?id=${artwork.id}" class="card">
                                <div class="card-img">
                                    <img src="${artwork.image}" alt="${artwork.title}">
                                </div>
                                <div class="card-body">
                                    <h3 class="card-title">${artwork.title}</h3>
                                </div>
                            </a>
                        `).join('')}
                        ${artworks.length === 0 ? '<p style="color: var(--mist); font-style: italic;">No works yet. <a href="upload.html" style="color: var(--gold);">Upload your first artwork</a></p>' : ''}
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading current user profile:', error);
                container.innerHTML = '<p>Error loading profile: ' + error.message + '</p>';
            }
        }

        // Logout function
        function logout() {
            console.log('🚪 Logging out...');
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user');
            window.location.href = 'log.html';
        }

        // Initialize profile loading
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Profile page initialized');
            
            // Debug: Check localStorage contents
            console.log('🔍 LocalStorage Debug:', {
                access_token: localStorage.getItem('access_token') ? 'Present' : 'Missing',
                jwtToken: localStorage.getItem('jwtToken') ? 'Present' : 'Missing',
                refresh_token: localStorage.getItem('refresh_token') ? 'Present' : 'Missing',
                user: localStorage.getItem('user') ? 'Present' : 'Missing',
                allKeys: Object.keys(localStorage)
            });
            
            // Check if user is authenticated
            const token = getJWTToken();
            if (!token) {
                console.log('🔐 No token found, redirecting to login');
                const container = document.getElementById('profile-container');
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem;">
                        <h2>Authentication Required</h2>
                        <p>You need to be logged in to view profiles.</p>
                        <p><strong>Debug Info:</strong> No JWT token found in localStorage.</p>
                        <div style="margin: 1rem 0;">
                            <button onclick="debugLocalStorage()" style="padding: 0.5rem 1rem; background: var(--sand); color: var(--brown); border: none; border-radius: 4px; margin-right: 0.5rem;">
                                Debug LocalStorage
                            </button>
                            <a href="log.html" style="display: inline-block; padding: 0.75rem 1.5rem; background: var(--gold); color: white; text-decoration: none; border-radius: 4px; margin-top: 1rem;">
                                Go to Login
                            </a>
                        </div>
                    </div>
                `;
                return;
            }
            
            console.log('🔑 Token found, loading profile...');
            console.log('🔍 Token details:', {
                tokenLength: token.length,
                tokenStart: token.substring(0, 20) + '...',
                userId: getUserIdFromToken(token)
            });
            
            // Load profile
            fetchProfile().catch(error => {
                console.error('💥 Profile loading failed:', error);
                const container = document.getElementById('profile-container');
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem;">
                        <h2>Profile Loading Failed</h2>
                        <p style="color: var(--brown); margin: 1rem 0;">${error.message}</p>
                        <details style="text-align: left; margin: 1rem 0; padding: 1rem; background: var(--parchment); border-radius: 4px;">
                            <summary style="cursor: pointer; font-weight: bold;">Technical Details</summary>
                            <pre style="font-size: 0.8rem; margin-top: 0.5rem; overflow-x: auto;">
Error: ${error.message}
Stack: ${error.stack}
Token Present: ${!!token}
User ID: ${getUserIdFromToken(token)}
Username from URL: ${new URLSearchParams(window.location.search).get('username') || 'none'}
Time: ${new Date().toISOString()}
                            </pre>
                        </details>
                        <div style="margin-top: 1.5rem;">
                            <button onclick="location.reload()" style="padding: 0.5rem 1rem; background: var(--gold); color: white; border: none; border-radius: 4px; margin-right: 0.5rem;">
                                Retry
                            </button>
                            <button onclick="debugLocalStorage()" style="padding: 0.5rem 1rem; background: var(--sand); color: var(--brown); border: none; border-radius: 4px; margin-right: 0.5rem;">
                                Debug LocalStorage
                            </button>
                            <a href="log.html" style="display: inline-block; padding: 0.5rem 1rem; color: var(--gold); text-decoration: none;">
                                Go to Login
                            </a>
                        </div>
                    </div>
                `;
            });
        });

        // Debug function to check localStorage
        function debugLocalStorage() {
            console.log('🔍 LocalStorage Contents:');
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                console.log(`${key}:`, value ? (value.length > 50 ? value.substring(0, 50) + '...' : value) : 'null');
            }
            
            // Check JWT token decoding
            const token = getJWTToken();
            if (token) {
                console.log('🔍 JWT Token Analysis:');
                console.log('Token length:', token.length);
                console.log('Token parts:', token.split('.').length);
                
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    console.log('JWT Payload:', payload);
                } catch (e) {
                    console.error('❌ Failed to decode JWT payload:', e);
                }
            }
        }
    </script>
</body>
</html>
