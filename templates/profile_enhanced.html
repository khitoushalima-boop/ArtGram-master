<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ArtGram</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f0e8;
            --parchment: #ede6d6;
            --sand: #d6c9b0;
            --gold: #b59a6a;
            --brown: #5a3e28;
            --espresso: #2b1d12;
            --ink: #1a1410;
            --mist: #8a7d6e;
            --white: #fdfaf5;
            --serif: 'Playfair Display', Georgia, serif;
            --narrow: 'Cormorant Garamond', serif;
            --sans: 'Jost', sans-serif;
            --ease: cubic-bezier(.25,.46,.45,.94);
            --shadow: 0 4px 32px rgba(42,28,16,.12);
            --shadow-lg: 0 12px 60px rgba(42,28,16,.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: var(--sans);
            font-weight: 300;
            line-height: 1.6;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3rem;
            height: 68px;
            background: rgba(245,240,232,.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--sand);
        }

        .nav-logo {
            font-family: var(--serif);
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: .04em;
            color: var(--espresso);
            text-decoration: none;
        }

        .nav-logo span {
            font-style: italic;
            color: var(--gold);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 3rem 3rem;
        }

        .profile-header {
            display: flex;
            gap: 3rem;
            align-items: flex-start;
            margin-bottom: 3rem;
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--white);
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-family: var(--serif);
            font-size: 2.5rem;
            font-weight: 400;
            color: var(--espresso);
            margin-bottom: 0.5rem;
        }

        .profile-handle {
            color: var(--mist);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .profile-bio {
            color: var(--ink);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .profile-stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }

        .profile-stat {
            text-align: center;
        }

        .profile-stat strong {
            display: block;
            font-size: 1.5rem;
            color: var(--espresso);
            cursor: pointer;
        }

        .profile-stat span {
            display: block;
            font-size: 0.8rem;
            color: var(--mist);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .profile-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-family: var(--sans);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--gold);
            color: white;
        }

        .btn-primary:hover {
            background: var(--brown);
        }

        .btn-secondary {
            background: var(--sand);
            color: var(--espresso);
        }

        .btn-secondary:hover {
            background: var(--mist);
            color: white;
        }

        .section-title {
            font-family: var(--serif);
            font-size: 1.8rem;
            color: var(--espresso);
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--sand);
            padding-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--sand);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .card-img {
            aspect-ratio: 4/3;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 1rem;
        }

        .card-title {
            font-family: var(--serif);
            font-size: 1.1rem;
            color: var(--espresso);
            margin-bottom: 0.5rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-family: var(--serif);
            font-size: 1.5rem;
            color: var(--espresso);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--mist);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--espresso);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--sand);
            border-radius: 4px;
            font-family: var(--sans);
            font-size: 0.9rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--parchment);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 500;
            color: var(--espresso);
        }

        .user-username {
            font-size: 0.8rem;
            color: var(--mist);
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .profile-stats {
                justify-content: center;
            }

            .container {
                padding: 100px 1.5rem 2rem;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">Art<span>Gram</span></a>
    </nav>

    <div class="container" id="profile-container">
        <p>Loading profile...</p>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Edit Profile</h2>
                <button class="close-btn" onclick="closeEditProfile()">&times;</button>
            </div>
            <form id="editProfileForm">
                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" name="display_name" maxlength="100">
                </div>
                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" maxlength="500" placeholder="Tell us about yourself..."></textarea>
                </div>
                <div class="form-group">
                    <label for="jobTitle">Job Title</label>
                    <input type="text" id="jobTitle" name="job_title" maxlength="100">
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" maxlength="100">
                </div>
                <div class="form-group">
                    <label for="website">Website</label>
                    <input type="url" id="website" name="website" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="avatar">Profile Picture</label>
                    <input type="file" id="avatar" name="avatar" accept="image/*">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" onclick="closeEditProfile()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div id="createPostModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create New Post</h2>
                <button class="close-btn" onclick="closeCreatePost()">&times;</button>
            </div>
            <form id="createPostForm">
                <div class="form-group">
                    <label for="postTitle">Title</label>
                    <input type="text" id="postTitle" name="title" required maxlength="255">
                </div>
                <div class="form-group">
                    <label for="postDescription">Description</label>
                    <textarea id="postDescription" name="description" placeholder="Describe your artwork..."></textarea>
                </div>
                <div class="form-group">
                    <label for="postCategory">Category</label>
                    <select id="postCategory" name="category">
                        <option value="">Select a category</option>
                        <option value="digital-art">Digital Art</option>
                        <option value="photography">Photography</option>
                        <option value="illustration">Illustration</option>
                        <option value="painting">Painting</option>
                        <option value="sculpture">Sculpture</option>
                        <option value="design">Design</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="postImage">Image</label>
                    <input type="file" id="postImage" name="image" accept="image/*" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Create Post</button>
                    <button type="button" class="btn btn-secondary" onclick="closeCreatePost()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Followers/Following Modal -->
    <div id="usersModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="usersModalTitle">Users</h2>
                <button class="close-btn" onclick="closeUsersModal()">&times;</button>
            </div>
            <div class="user-list" id="usersList">
                <!-- Users will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const USER_API = '/api/gateway/users/';
        const ARTWORKS_API = '/api/gateway/artworks/';

        // Get JWT token
        function getJWTToken() {
            return localStorage.getItem('access_token') || localStorage.getItem('token');
        }

        // Enhanced fetch function with JWT support
        async function authFetch(url, options = {}) {
            const jwtToken = getJWTToken();
            
            const defaultOptions = {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest',
                    'Accept': 'application/json'
                }
            };
            
            if (jwtToken) {
                defaultOptions.headers['Authorization'] = `Bearer ${jwtToken}`;
            }
            
            const fetchOptions = { ...defaultOptions, ...options };
            
            try {
                const response = await fetch(url, fetchOptions);
                
                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    localStorage.removeItem('user');
                    window.location.href = 'log.html';
                    return;
                }
                
                return response;
            } catch (error) {
                console.error('Auth fetch error:', error);
                throw error;
            }
        }

        // Load profile
        async function loadProfile() {
            const container = document.getElementById('profile-container');
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('username');
            
            try {
                let userRes;
                if (username) {
                    userRes = await authFetch(`${USER_API}profile/username/${username}/`);
                } else {
                    userRes = await authFetch(`${USER_API}profile/`);
                }
                
                if (!userRes.ok) {
                    throw new Error(`Failed to fetch profile: ${userRes.status}`);
                }
                
                const user = await userRes.json();
                
                // Fetch user's artworks
                let artworks = [];
                try {
                    const artworksRes = await authFetch(`${ARTWORKS_API}?user_id=${user.id}`);
                    if (artworksRes.ok) {
                        artworks = await artworksRes.json();
                    }
                } catch (error) {
                    console.warn('Could not fetch artworks:', error);
                }

                const isCurrentUser = !username || user.username === username;
                
                container.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <img src="${user.avatar || 'https://ui-avatars.com/api/?name=' + user.username + '&size=200&background=b59a6a&color=ffffff'}" alt="${user.username}">
                        </div>
                        <div class="profile-info">
                            <h1 class="profile-name">${user.display_name || user.username}</h1>
                            <div class="profile-handle">@${user.username} ${user.location ? '· ' + user.location : ''}</div>
                            <div class="profile-bio">${user.bio || 'No bio yet.'}</div>
                            
                            <div class="profile-stats">
                                <div class="profile-stat"><strong>${artworks.length}</strong><span>Works</span></div>
                                <div class="profile-stat"><strong><a href="#" onclick="showFollowers(${user.id})" style="color: inherit; text-decoration: none;">${user.followers_count || 0}</a></strong><span>Followers</span></div>
                                <div class="profile-stat"><strong><a href="#" onclick="showFollowing(${user.id})" style="color: inherit; text-decoration: none;">${user.following_count || 0}</a></strong><span>Following</span></div>
                            </div>
                            
                            <div class="profile-actions">
                                ${isCurrentUser ? `
                                    <button onclick="openEditProfile(${JSON.stringify(user).replace(/"/g, '&quot;')})" class="btn btn-primary">Edit Profile</button>
                                    <button onclick="openCreatePost()" class="btn btn-primary">Create Post</button>
                                    <button onclick="logout()" class="btn btn-secondary">Logout</button>
                                ` : `
                                    <button onclick="toggleFollow(${user.id}, ${user.is_following || false})" class="btn btn-primary" id="followBtn">
                                        ${user.is_following ? 'Unfollow' : 'Follow'}
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>

                    <h2 class="section-title">Portfolio</h2>
                    <div class="grid">
                        ${artworks.map(artwork => `
                            <div class="card">
                                <div class="card-img">
                                    <img src="${artwork.image}" alt="${artwork.title}">
                                    ${isCurrentUser ? `<button onclick="deletePost(${artwork.id})" class="btn btn-secondary" style="position: absolute; top: 10px; right: 10px; padding: 0.5rem;">Delete</button>` : ''}
                                </div>
                                <div class="card-body">
                                    <h3 class="card-title">${artwork.title}</h3>
                                    <p style="color: var(--mist); font-size: 0.8rem;">${artwork.description || ''}</p>
                                </div>
                            </div>
                        `).join('')}
                        ${artworks.length === 0 ? '<p style="color: var(--mist); font-style: italic; grid-column: 1/-1;">No works yet.</p>' : ''}
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading profile:', error);
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem;">
                        <h2>Error loading profile</h2>
                        <p style="color: var(--brown);">${error.message}</p>
                        <button onclick="location.reload()" class="btn btn-primary">Retry</button>
                    </div>
                `;
            }
        }

        // Profile editing functions
        function openEditProfile(user) {
            const modal = document.getElementById('editProfileModal');
            document.getElementById('displayName').value = user.display_name || '';
            document.getElementById('bio').value = user.bio || '';
            document.getElementById('jobTitle').value = user.job_title || '';
            document.getElementById('location').value = user.location || '';
            document.getElementById('website').value = user.website || '';
            modal.classList.add('active');
        }

        function closeEditProfile() {
            document.getElementById('editProfileModal').classList.remove('active');
        }

        // Create post functions
        function openCreatePost() {
            document.getElementById('createPostModal').classList.add('active');
        }

        function closeCreatePost() {
            document.getElementById('createPostModal').classList.remove('active');
        }

        // Follow/Unfollow functions
        async function toggleFollow(userId, isFollowing) {
            try {
                const endpoint = isFollowing ? 'unfollow' : 'follow';
                const response = await authFetch(`${USER_API}${endpoint}/${userId}/`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    loadProfile(); // Reload to update follow status
                } else {
                    alert('Failed to toggle follow status');
                }
            } catch (error) {
                console.error('Error toggling follow:', error);
                alert('Error toggling follow status');
            }
        }

        // Show followers
        async function showFollowers(userId) {
            try {
                const response = await authFetch(`${USER_API}followers/${userId}/`);
                const users = await response.json();
                
                document.getElementById('usersModalTitle').textContent = 'Followers';
                document.getElementById('usersList').innerHTML = users.map(user => `
                    <div class="user-item">
                        <div class="user-avatar">
                            <img src="${user.avatar || 'https://ui-avatars.com/api/?name=' + user.username + '&size=40&background=b59a6a&color=ffffff'}" alt="${user.username}">
                        </div>
                        <div class="user-info">
                            <div class="user-name">${user.display_name || user.username}</div>
                            <div class="user-username">@${user.username}</div>
                        </div>
                        <a href="profile.html?username=${user.username}" class="btn btn-secondary">View</a>
                    </div>
                `).join('');
                
                document.getElementById('usersModal').classList.add('active');
            } catch (error) {
                console.error('Error loading followers:', error);
            }
        }

        // Show following
        async function showFollowing(userId) {
            try {
                const response = await authFetch(`${USER_API}following/${userId}/`);
                const users = await response.json();
                
                document.getElementById('usersModalTitle').textContent = 'Following';
                document.getElementById('usersList').innerHTML = users.map(user => `
                    <div class="user-item">
                        <div class="user-avatar">
                            <img src="${user.avatar || 'https://ui-avatars.com/api/?name=' + user.username + '&size=40&background=b59a6a&color=ffffff'}" alt="${user.username}">
                        </div>
                        <div class="user-info">
                            <div class="user-name">${user.display_name || user.username}</div>
                            <div class="user-username">@${user.username}</div>
                        </div>
                        <a href="profile.html?username=${user.username}" class="btn btn-secondary">View</a>
                    </div>
                `).join('');
                
                document.getElementById('usersModal').classList.add('active');
            } catch (error) {
                console.error('Error loading following:', error);
            }
        }

        function closeUsersModal() {
            document.getElementById('usersModal').classList.remove('active');
        }

        // Delete post
        async function deletePost(postId) {
            if (confirm('Are you sure you want to delete this post?')) {
                try {
                    const response = await authFetch(`${ARTWORKS_API}${postId}/`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        loadProfile(); // Reload to update posts
                    } else {
                        alert('Failed to delete post');
                    }
                } catch (error) {
                    console.error('Error deleting post:', error);
                    alert('Error deleting post');
                }
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        // Form submissions
        document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const response = await authFetch(`${USER_API}profile/update/`, {
                    method: 'PATCH',
                    body: formData
                });
                
                if (response.ok) {
                    closeEditProfile();
                    loadProfile();
                } else {
                    alert('Failed to update profile');
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                alert('Error updating profile');
            }
        });

        document.getElementById('createPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const response = await authFetch(`${ARTWORKS_API}`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    closeCreatePost();
                    loadProfile();
                } else {
                    alert('Failed to create post');
                }
            } catch (error) {
                console.error('Error creating post:', error);
                alert('Error creating post');
            }
        });

        // Initialize
        loadProfile();
    </script>
</body>
</html>
