<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtGram</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f0e8;
            --parchment: #ede6d6;
            --sand: #d6c9b0;
            --gold: #b59a6a;
            --brown: #5a3e28;
            --espresso: #2b1d12;
            --ink: #1a1410;
            --mist: #8a7d6e;
            --white: #fdfaf5;
            --serif: 'Playfair Display', Georgia, serif;
            --sans: 'Jost', sans-serif;
            --ease: cubic-bezier(.25,.46,.45,.94);
            --shadow: 0 4px 32px rgba(42,28,16,.12);
            --shadow-lg: 0 12px 60px rgba(42,28,16,.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: var(--sans);
            font-weight: 300;
            line-height: 1.6;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3rem;
            height: 68px;
            background: rgba(245,240,232,.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--sand);
        }

        .nav-logo {
            font-family: var(--serif);
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: .04em;
            color: var(--espresso);
            text-decoration: none;
        }

        .nav-logo span {
            font-style: italic;
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }

        .nav-links li a {
            color: var(--ink);
            text-decoration: none;
            font-weight: 500;
            transition: color .25s;
        }

        .nav-links li a:hover {
            color: var(--gold);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 3rem 3rem;
        }

        .hero {
            text-align: center;
            padding: 5rem 2rem 3.5rem;
            border-bottom: 1px solid var(--sand);
        }

        .hero h1 {
            font-family: var(--serif);
            font-size: clamp(2.4rem,5vw,3.8rem);
            font-weight: 400;
            line-height: 1.15;
            color: var(--espresso);
            max-width: 680px;
            margin: 0 auto .9rem;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--mist);
            max-width: 500px;
            margin: 0 auto;
        }

        .auth-status {
            background: var(--white);
            border: 1px solid var(--sand);
            border-radius: 8px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: center;
        }

        .auth-status h3 {
            color: var(--espresso);
            margin-bottom: 1rem;
        }

        .auth-status p {
            color: var(--mist);
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--gold);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin: 0 0.5rem;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: var(--brown);
        }

        .debug {
            background: var(--parchment);
            padding: 1rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
            margin: 1rem 0;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">Art<span>Gram</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html?mode=explore">Explore</a></li>
            <li id="nav-auth-links">
                <!-- Will be populated by JS -->
            </li>
        </ul>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>Welcome to <em>ArtGram</em></h1>
            <p>Discover amazing artwork and connect with creative artists</p>
        </div>

        <div class="auth-status" id="auth-status">
            <h3>Checking Authentication...</h3>
            <p>Please wait while we verify your login status.</p>
            <div class="debug" id="debug"></div>
        </div>
    </div>

    <script>
        function showMessage(title, message, isAuthenticated) {
            const authStatus = document.getElementById('auth-status');
            authStatus.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                ${!isAuthenticated ? '<a href="login_working.html" class="btn">Login</a>' : '<a href="profile.html" class="btn">View Profile</a><a href="#" onclick="logout()" class="btn">Logout</a>'}
            `;
        }

        function debug(text) {
            const debugDiv = document.getElementById('debug');
            debugDiv.innerHTML += new Date().toLocaleTimeString() + ': ' + text + '<br>';
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        function logout() {
            debug('Logging out...');
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user');
            location.reload();
        }

        // Simple authentication check
        function checkAuth() {
            debug('Starting authentication check...');
            
            const token = localStorage.getItem('access_token');
            const userStr = localStorage.getItem('user');
            
            debug(`Token found: ${!!token}`);
            debug(`User data found: ${!!userStr}`);
            
            if (token && userStr) {
                try {
                    const user = JSON.parse(userStr);
                    debug(`User parsed: ${user.username}`);
                    debug(`User ID: ${user.id}`);
                    
                    showMessage(
                        `Welcome, ${user.username}!`, 
                        'You are successfully logged in and can access your profile and all features.', 
                        true
                    );
                    
                    // Update navigation
                    const authLinks = document.getElementById('nav-auth-links');
                    authLinks.innerHTML = `
                        <a href="profile.html?username=${user.username}">Profile</a>
                        <a href="#" onclick="logout()">Logout</a>
                    `;
                    
                } catch (error) {
                    debug(`Error parsing user data: ${error.message}`);
                    showMessage(
                        'Login Required', 
                        'Please login to access your account and features.', 
                        false
                    );
                }
            } else {
                debug('No authentication data found');
                showMessage(
                    'Login Required', 
                    'Please login to access your account and features.', 
                    false
                );
            }
        }

        // Check authentication on page load
        window.addEventListener('load', function() {
            debug('Page loaded, checking authentication...');
            checkAuth();
        });
    </script>
</body>
</html>
