<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ArtGram Login - Working</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 350px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #2b1d12;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #5a3e28;
        }
        .form-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d6c9b0;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #b59a6a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #5a3e28;
        }
        .message {
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            text-align: center;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .debug {
            background: #f0f0f0;
            padding: 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ArtGram Login</h2>
        
        <div id="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" value="testuser" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" value="test123" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        
        <div style="text-align: center; margin-top: 1rem;">
            <a href="index.html">← Back to Home</a>
        </div>
        
        <div class="debug" id="debug"></div>
    </div>

    <script>
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
        }
        
        function debug(text) {
            const debugDiv = document.getElementById('debug');
            debugDiv.innerHTML += new Date().toLocaleTimeString() + ': ' + text + '<br>';
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            debug(`Starting login for: ${username}`);
            
            try {
                // Use the exact same API that works in backend test
                const response = await fetch('http://localhost:8001/api/gateway/users/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                debug(`Response status: ${response.status}`);
                debug(`Response headers: ${response.headers.get('content-type')}`);
                
                const responseText = await response.text();
                debug(`Raw response: ${responseText.substring(0, 200)}...`);
                
                if (response.ok) {
                    const data = JSON.parse(responseText);
                    debug(`Parsed data keys: ${Object.keys(data)}`);
                    debug(`Has access token: ${!!data.access}`);
                    debug(`Has refresh token: ${!!data.refresh}`);
                    debug(`Has user data: ${!!data.user}`);
                    
                    if (data.user) {
                        debug(`User username: ${data.user.username}`);
                    }
                    
                    // Store tokens
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    debug('Tokens stored in localStorage');
                    
                    // Verify storage
                    const storedToken = localStorage.getItem('access_token');
                    const storedUser = localStorage.getItem('user');
                    debug(`Stored token verification: ${!!storedToken}`);
                    debug(`Stored user verification: ${!!storedUser}`);
                    
                    showMessage('✅ Login successful! Redirecting...', 'success');
                    
                    // Wait a moment then redirect
                    setTimeout(() => {
                        debug('Redirecting to main app...');
                        window.location.href = 'index.html';
                    }, 2000);
                    
                } else {
                    debug(`Login failed with status: ${response.status}`);
                    try {
                        const errorData = JSON.parse(responseText);
                        showMessage('Login failed: ' + (errorData.detail || errorData.error || 'Unknown error'), 'error');
                    } catch (e) {
                        showMessage('Login failed: Server error', 'error');
                    }
                }
                
            } catch (error) {
                debug(`Network error: ${error.message}`);
                showMessage('Network error. Please try again.', 'error');
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            login();
        });
        
        // Check if already logged in
        window.addEventListener('load', function() {
            debug('Page loaded, checking existing authentication...');
            
            const token = localStorage.getItem('access_token');
            const user = localStorage.getItem('user');
            
            debug(`Existing token found: ${!!token}`);
            debug(`Existing user found: ${!!user}`);
            
            if (token && user) {
                try {
                    const userData = JSON.parse(user);
                    debug(`Existing user: ${userData.username}`);
                    showMessage('You are already logged in! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } catch (e) {
                    debug('Invalid user data in localStorage');
                }
            }
        });
    </script>
</body>
</html>
